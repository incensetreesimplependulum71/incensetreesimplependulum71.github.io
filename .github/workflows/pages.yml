name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          ADA8DC: ${{ secrets.ADA8DC }}
          B11637: ${{ secrets.B11637 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('ADA8DC', '')
          tag_b = os.environ.get('B11637', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- b9c52021b74d721d796c35464ea65318020b23bc58342e -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 4cf4898dc4ecc01a -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
